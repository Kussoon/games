<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>さかな当てゲーム</title><style>
*{box-sizing:border-box}
:root{--text:#173042;--muted:#5d7482;--accent:#1480aa;--accent2:#0e6589;--line:#c8e2ec;--soft:#edf8fc;--yellow:#fff9dd}
body{margin:0;background:linear-gradient(180deg,#dff5ff,#fafdff);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;color:var(--text)}
main{max-width:760px;margin:auto;padding:12px 12px 30px}
.panel{background:#fff;border:1px solid var(--line);border-radius:20px;padding:18px;box-shadow:0 8px 24px rgba(23,48,66,.08)}
.hidden{display:none!important}
h1,h2{margin-top:0}
button,a.button{display:block;width:100%;text-align:center;text-decoration:none;padding:14px 16px;border-radius:14px;font-size:17px;font-weight:800;background:var(--accent);color:#fff;border:0;margin:10px 0;cursor:pointer}
button.secondary,a.button.secondary{background:var(--soft);color:var(--accent2);border:1px solid var(--line)}
.teacher-banner{display:flex;gap:14px;align-items:center;margin-bottom:14px}
.teacher-banner img{width:100px;height:100px;object-fit:cover;border-radius:18px}
.speech{flex:1;background:#f4fbfe;border:1px solid var(--line);border-radius:16px;padding:14px;line-height:1.65}
.lesson-chip{margin:10px auto 14px;text-align:center;padding:9px 14px;border-radius:999px;background:var(--yellow);border:1px solid #ecd77d;font-weight:800;color:#6b5512}
.kanji{font-size:88px;text-align:center;font-weight:850;margin:12px 0}
.reading{text-align:center;font-size:28px;font-weight:800;margin-bottom:10px}
.meaning,.alias-note,.career-note{font-size:17px;line-height:1.72;margin:9px 0;padding:12px 14px;border-radius:12px}
.meaning{background:#f8fcfe;border:1px solid var(--line)}
.alias-note{background:var(--yellow);border:1px solid #ecd77d}
.career-note{background:#eef8ff;border:1px solid #b8def0}
.scorebar{display:flex;justify-content:space-between;gap:10px;font-weight:800;margin-bottom:10px}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.choices button{margin:0;font-size:22px;padding:15px 8px}
.list-grid{display:grid;grid-template-columns:1fr;gap:10px}
.list-card{display:flex;gap:14px;text-decoration:none;color:inherit;background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px}
.list-card .k{font-size:34px;font-weight:850;min-width:52px}
.list-card .r{line-height:1.7}
.small{font-size:14px;color:var(--muted);line-height:1.6}
.note{background:var(--yellow);border:1px solid #ecd77d;border-radius:12px;padding:13px 14px;font-size:15px;line-height:1.65}
.nav-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
footer{text-align:center;color:var(--muted);font-size:14px;margin-top:16px}

.card{background:#fff;border:1px solid var(--line);border-radius:22px;overflow:hidden;box-shadow:0 8px 24px rgba(23,48,66,.10)}
.banner{display:block;width:100%;height:auto}.menu{padding:16px}
</style></head><body><main><section class="card">

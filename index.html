<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#e9f7ff">
<title>さかな漢字ゲーム</title>
<style>
:root {
  --bg:#eef8fc; --card:#ffffff; --ink:#173042; --accent:#1677a6;
  --accent2:#0f5f86; --good:#167a45; --bad:#b23a2a; --line:#cfe5ef;
}
*{box-sizing:border-box}
body{
  margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
  background:linear-gradient(180deg,#dff4ff,#f9fdff);color:var(--ink);min-height:100vh;
}
main{max-width:720px;margin:auto;padding:18px 16px 40px}
h1{font-size:clamp(28px,7vw,42px);text-align:center;margin:10px 0}
.subtitle{text-align:center;color:#4c6b7a;margin-bottom:18px}
.panel{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:20px;box-shadow:0 8px 24px rgba(23,48,66,.08)}
.hidden{display:none!important}
.menu-grid{display:grid;gap:12px}
button{
  width:100%;border:0;border-radius:14px;padding:15px 16px;font-size:18px;font-weight:700;
  background:var(--accent);color:#fff;cursor:pointer;touch-action:manipulation;
}
button.secondary{background:#eaf5fa;color:var(--accent2);border:1px solid var(--line)}
button.warn{background:#fff0ed;color:var(--bad);border:1px solid #f1c8bf}
button:disabled{opacity:.45}
.row{display:flex;gap:10px}
.row>*{flex:1}
.card-kanji{font-size:clamp(84px,24vw,150px);text-align:center;line-height:1.15;margin:8px 0}
.reading{font-size:30px;font-weight:800;text-align:center;color:var(--accent2)}
.meaning{font-size:18px;line-height:1.75;background:#f6fbfd;border-radius:14px;padding:14px;margin:16px 0}
.progress{font-size:15px;color:#577483;text-align:center;margin-bottom:10px}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:18px}
.choice{background:#f4fbfe;color:var(--ink);border:2px solid var(--line);min-height:64px}
.choice.correct{background:#e7f7ee;border-color:#6bb58a;color:var(--good)}
.choice.wrong{background:#fff0ed;border-color:#e5a193;color:var(--bad)}
.feedback{margin-top:16px;padding:14px;border-radius:14px;font-size:18px;line-height:1.6}
.feedback.good{background:#e7f7ee;color:var(--good)}
.feedback.bad{background:#fff0ed;color:var(--bad)}
.stats{display:flex;justify-content:space-between;gap:8px;font-size:15px;margin-bottom:10px}
.pill{background:#eaf5fa;padding:8px 10px;border-radius:999px}
.small{font-size:14px;color:#5c7480;line-height:1.5}
.resume{background:#fff9dd;border:1px solid #ecd77d;padding:12px;border-radius:12px;margin-bottom:14px}
footer{text-align:center;color:#6b7f89;font-size:13px;margin-top:18px}
@media (max-width:430px){.choices{grid-template-columns:1fr} .row{flex-direction:column}}
</style>
</head>
<body>
<main>
  <h1>🐟 さかな漢字ゲーム</h1>
  <div class="subtitle">見て覚えて、ゲームで挑戦！</div>

  <section id="menu" class="panel">
    <div id="resumeBox" class="resume hidden"></div>
    <div class="menu-grid">
      <button id="trainBtn">トレーニングを始める</button>
      <button id="gameBtn">ゲームを始める</button>
      <button id="weakBtn" class="secondary">苦手な漢字を復習する</button>
      <button id="resetBtn" class="warn">記録を最初からやり直す</button>
    </div>
    <p class="small">進み具合は、このiPhoneのSafari内に自動保存されます。</p>
  </section>

  <section id="training" class="panel hidden">
    <div id="trainProgress" class="progress"></div>
    <div id="trainKanji" class="card-kanji"></div>
    <div id="trainReading" class="reading"></div>
    <div id="trainMeaning" class="meaning"></div>
    <div class="row">
      <button id="prevCard" class="secondary">前へ</button>
      <button id="nextCard">覚えた！ 次へ</button>
    </div>
    <div style="height:10px"></div>
    <button id="startFromTraining" class="secondary">ここまででゲームを始める</button>
    <div style="height:10px"></div>
    <button class="secondary homeBtn">メニューへ戻る</button>
  </section>

  <section id="game" class="panel hidden">
    <div class="stats">
      <div id="qCount" class="pill"></div>
      <div id="score" class="pill"></div>
    </div>
    <div id="gameKanji" class="card-kanji"></div>
    <div class="progress">この漢字は何と読む？</div>
    <div id="choices" class="choices"></div>
    <div id="feedback" class="feedback hidden"></div>
    <div style="height:12px"></div>
    <button id="nextQuestion" class="hidden">次の問題</button>
    <div style="height:10px"></div>
    <button class="secondary homeBtn">途中保存してメニューへ</button>
  </section>

  <section id="result" class="panel hidden">
    <h2 style="text-align:center">ゲーム終了！</h2>
    <div id="resultText" class="meaning" style="text-align:center"></div>
    <button id="retryBtn">もう一度遊ぶ</button>
    <div style="height:10px"></div>
    <button class="secondary homeBtn">メニューへ戻る</button>
  </section>

  <footer>さかな漢字ゲーム・家庭学習版</footer>
</main>

<script>
const FISH = [{"kanji": "鯛", "reading": "たい", "meaning": "お祝いの席でもおなじみの魚。赤い体と上品な味で知られています。"}, {"kanji": "鯖", "reading": "さば", "meaning": "背中の青い模様が特徴。みそ煮や塩焼きでよく食べられます。"}, {"kanji": "鰯", "reading": "いわし", "meaning": "群れで泳ぐ小さな魚。足が早く、傷みやすい魚としても知られます。"}, {"kanji": "鰹", "reading": "かつお", "meaning": "春と秋に旬を迎える魚。たたきや削り節で親しまれています。"}, {"kanji": "鮭", "reading": "さけ", "meaning": "川で生まれ、海で育ち、また川へ戻る魚。食卓でも人気です。"}, {"kanji": "鱈", "reading": "たら", "meaning": "寒い海にすむ白身魚。鍋料理やフライによく使われます。"}, {"kanji": "鰤", "reading": "ぶり", "meaning": "成長すると名前が変わる出世魚。冬の寒ぶりが有名です。"}, {"kanji": "鰆", "reading": "さわら", "meaning": "細長い体の魚。西日本では春を告げる魚として親しまれます。"}, {"kanji": "鯵", "reading": "あじ", "meaning": "身近な青魚。塩焼き、フライ、たたきなど食べ方も豊富です。"}, {"kanji": "鮪", "reading": "まぐろ", "meaning": "長い距離を泳ぎ続ける大きな魚。刺身やすしで人気です。"}, {"kanji": "鰻", "reading": "うなぎ", "meaning": "細長い体をした魚。かば焼きが有名です。"}, {"kanji": "鮫", "reading": "さめ", "meaning": "鋭い歯を持つ種類が多い魚。世界中の海にすんでいます。"}, {"kanji": "鯉", "reading": "こい", "meaning": "川や池にすむ魚。観賞用の錦鯉も有名です。"}, {"kanji": "鮎", "reading": "あゆ", "meaning": "川にすむ香りのよい魚。『香魚』とも呼ばれます。"}, {"kanji": "鱸", "reading": "すずき", "meaning": "海や川の河口近くにすむ魚。こちらも成長で名前が変わる出世魚です。"}, {"kanji": "鯰", "reading": "なまず", "meaning": "川や沼の底にすむ、ひげのある魚。夜に活発に動きます。"}, {"kanji": "鰈", "reading": "かれい", "meaning": "平たい体で海底にすむ魚。目が体の片側に並んでいます。"}, {"kanji": "鮃", "reading": "ひらめ", "meaning": "平たい体をした魚。一般に、目が左側に集まるとされます。"}, {"kanji": "鯱", "reading": "しゃち", "meaning": "海にすむ大型の哺乳類ですが、漢字では魚へんが使われています。"}, {"kanji": "鱒", "reading": "ます", "meaning": "サケの仲間の総称。川や湖にすむ種類が多くいます。"}];
const KEY = "sakanaKanjiGame_v1";

const defaultState = {
  trainIndex:0, trainedCount:0, score:0, qIndex:0, gameActive:false,
  currentSet:[], questionOrder:[], weak:{}, totalAnswered:0
};
let state = load();
let session = {mode:"normal", answered:false};

function load(){
  try { return Object.assign({}, defaultState, JSON.parse(localStorage.getItem(KEY)||"{}")); }
  catch(e){ return {...defaultState}; }
}
function save(){ localStorage.setItem(KEY, JSON.stringify(state)); }
function show(id){
  ["menu","training","game","result"].forEach(x=>document.getElementById(x).classList.toggle("hidden",x!==id));
}
function shuffle(a){
  a=[...a]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a;
}
function updateMenu(){
  const box=document.getElementById("resumeBox");
  if(state.gameActive){
    box.classList.remove("hidden");
    box.innerHTML=`前回のゲームが途中です（${state.qIndex+1}問目）。<br><button id="resumeGame" style="margin-top:8px">続きから再開</button>`;
    document.getElementById("resumeGame").onclick=()=>resumeGame();
  } else if(state.trainedCount>0 && state.trainedCount<FISH.length){
    box.classList.remove("hidden");
    box.innerHTML=`トレーニングは ${state.trainedCount} / ${FISH.length} 枚まで進んでいます。`;
  } else box.classList.add("hidden");
  document.getElementById("weakBtn").disabled=Object.keys(state.weak).length===0;
}
function renderTraining(){
  const f=FISH[state.trainIndex];
  document.getElementById("trainProgress").textContent=`${state.trainIndex+1}枚目 / ${FISH.length}枚`;
  document.getElementById("trainKanji").textContent=f.kanji;
  document.getElementById("trainReading").textContent=f.reading;
  document.getElementById("trainMeaning").textContent=f.meaning;
  document.getElementById("prevCard").disabled=state.trainIndex===0;
  document.getElementById("nextCard").textContent=state.trainIndex===FISH.length-1?"トレーニング完了！":"覚えた！ 次へ";
}
function startTraining(){
  state.trainIndex=Math.min(state.trainIndex,FISH.length-1); save(); renderTraining(); show("training");
}
function beginGame(mode="normal", resume=false){
  session.mode=mode; session.answered=false;
  if(!resume){
    let indices;
    if(mode==="weak") indices=Object.keys(state.weak).map(Number);
    else {
      const count=state.trainedCount>0 ? state.trainedCount : FISH.length;
      indices=[...Array(count).keys()];
    }
    if(indices.length===0) indices=[...Array(FISH.length).keys()];
    state.currentSet=indices;
    state.questionOrder=shuffle(indices).slice(0,Math.min(10,indices.length));
    state.qIndex=0; state.score=0; state.gameActive=true;
    save();
  }
  renderQuestion(); show("game");
}
function resumeGame(){
  if(!state.questionOrder.length) return beginGame("normal",false);
  beginGame("normal",true);
}
function renderQuestion(){
  session.answered=false;
  const idx=state.questionOrder[state.qIndex];
  const f=FISH[idx];
  document.getElementById("qCount").textContent=`${state.qIndex+1} / ${state.questionOrder.length}問`;
  document.getElementById("score").textContent=`正解 ${state.score}`;
  document.getElementById("gameKanji").textContent=f.kanji;
  document.getElementById("feedback").className="feedback hidden";
  document.getElementById("nextQuestion").classList.add("hidden");
  const distractors=shuffle(FISH.map((x,i)=>({i,reading:x.reading})).filter(x=>x.i!==idx))
    .slice(0,3).map(x=>x.reading);
  const opts=shuffle([f.reading,...distractors]);
  const wrap=document.getElementById("choices"); wrap.innerHTML="";
  opts.forEach(opt=>{
    const b=document.createElement("button"); b.className="choice"; b.textContent=opt;
    b.onclick=()=>answer(b,opt,idx);
    wrap.appendChild(b);
  });
}
function answer(btn,opt,idx){
  if(session.answered) return; session.answered=true;
  const f=FISH[idx], ok=opt===f.reading;
  document.querySelectorAll(".choice").forEach(b=>{
    b.disabled=true;
    if(b.textContent===f.reading) b.classList.add("correct");
  });
  if(!ok) btn.classList.add("wrong");
  const fb=document.getElementById("feedback");
  fb.classList.remove("hidden");
  if(ok){
    state.score++; delete state.weak[idx];
    fb.classList.add("good");
    fb.innerHTML=`<b>正解！</b>　${f.kanji}は「${f.reading}」です。<br>${f.meaning}`;
  } else {
    state.weak[idx]=(state.weak[idx]||0)+1;
    fb.classList.add("bad");
    fb.innerHTML=`<b>おしい！</b>　正解は「${f.reading}」です。<br>${f.meaning}`;
  }
  state.totalAnswered++; save();
  document.getElementById("score").textContent=`正解 ${state.score}`;
  document.getElementById("nextQuestion").classList.remove("hidden");
}
function nextQuestion(){
  if(state.qIndex < state.questionOrder.length-1){
    state.qIndex++; save(); renderQuestion();
  } else finishGame();
}
function finishGame(){
  state.gameActive=false; save();
  const total=state.questionOrder.length;
  const pct=Math.round(state.score/total*100);
  let msg=pct===100?"全問正解！ さかな博士です！":pct>=70?"よくできました！":pct>=40?"いい調子です。もう一度挑戦！":"まずはトレーニングで復習してみましょう。";
  document.getElementById("resultText").innerHTML=`<b>${state.score} / ${total} 問正解</b><br>${msg}`;
  show("result");
}
document.getElementById("trainBtn").onclick=startTraining;
document.getElementById("gameBtn").onclick=()=>beginGame("normal");
document.getElementById("weakBtn").onclick=()=>beginGame("weak");
document.getElementById("prevCard").onclick=()=>{if(state.trainIndex>0)state.trainIndex--;save();renderTraining();};
document.getElementById("nextCard").onclick=()=>{
  state.trainedCount=Math.max(state.trainedCount,state.trainIndex+1);
  if(state.trainIndex<FISH.length-1){state.trainIndex++;save();renderTraining();}
  else {state.trainedCount=FISH.length;save();beginGame("normal");}
};
document.getElementById("startFromTraining").onclick=()=>{
  state.trainedCount=Math.max(state.trainedCount,state.trainIndex+1); save(); beginGame("normal");
};
document.getElementById("nextQuestion").onclick=nextQuestion;
document.getElementById("retryBtn").onclick=()=>beginGame(session.mode);
document.querySelectorAll(".homeBtn").forEach(b=>b.onclick=()=>{save();updateMenu();show("menu");});
document.getElementById("resetBtn").onclick=()=>{
  if(confirm("トレーニングや成績の記録をすべて消しますか？")){
    localStorage.removeItem(KEY); state={...defaultState}; updateMenu(); show("menu");
  }
};
updateMenu(); show("menu");
</script>
</body>
</html>

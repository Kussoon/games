<title>Kussoon Games</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif}
body{background:linear-gradient(180deg,#eaf7ff,#fff);color:#17324a}
main{max-width:430px;margin:auto;min-height:100dvh;padding:14px 12px 24px}
h1{margin:4px 0 2px;text-align:center;font-size:34px;color:#17538e}
.sub{text-align:center;font-weight:700;color:#557286;margin-bottom:12px}
.hero{display:grid;grid-template-columns:38% 62%;align-items:center;background:#fff;border:1px solid #bfdeec;border-radius:18px;overflow:hidden;box-shadow:0 5px 16px #1f55731a;margin-bottom:12px}
.hero img{width:100%;height:155px;object-fit:contain;background:#f7fbfd}
.speech{padding:12px;font-size:14px;font-weight:700;line-height:1.55}
.games{display:grid;gap:10px}
a.game{display:block;text-decoration:none;color:#fff;border-radius:16px;padding:17px 16px;font-size:19px;font-weight:900;box-shadow:0 4px 10px #0002}
a.game small{display:block;font-size:12px;margin-top:4px;font-weight:650}
.fish{background:#1f78c8}
.nishi{background:#3f9b64}
.coming{background:#9c7ac8;opacity:.62;pointer-events:none}
footer{text-align:center;margin-top:18px;font-size:12px;color:#6d8390;line-height:1.7}
</style>

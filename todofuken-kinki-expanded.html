<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>都道府県記憶ゲーム ～近畿地方～</title>
<style>
:root{
 --bg:#eefaff;--card:#fffef8;--ink:#252525;--green:#3a9f42;--blue:#2977d5;
 --yellow:#ffd84f;--red:#ef5b5b;--line:#d8e1e8;--shadow:0 8px 22px rgba(30,70,100,.15);
}
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(#ddf6ff,#fff9df);font-family:"Yu Gothic","Hiragino Kaku Gothic ProN",system-ui,sans-serif;color:var(--ink)}
button{font:inherit}
.app{max-width:900px;margin:auto;padding:10px 10px 28px}
.panel{background:rgba(255,255,255,.96);border:2px solid #d6ecef;border-radius:22px;box-shadow:var(--shadow);padding:14px;margin:10px 0}
header{display:grid;grid-template-columns:72px 1fr auto;gap:10px;align-items:center}
.teacher{width:72px;height:72px;border-radius:50%;object-fit:cover;border:3px solid #8fd1d9;background:white}
h1{font-size:clamp(22px,5vw,34px);margin:0;line-height:1.15}
.subtitle{color:#16848a;font-weight:900;margin-top:4px}
.homebtn{border:0;border-radius:999px;padding:10px 13px;background:#287bd8;color:#fff;font-weight:900}
.mode-tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.mode{border:3px solid #dfe7ea;border-radius:16px;background:#fff;padding:12px 8px;font-weight:900;box-shadow:0 4px 0 rgba(0,0,0,.12)}
.mode.active{background:#e8f7d7;border-color:#3a9f42;color:#136b29}
.status{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.stat{background:#f8fbfc;border:2px solid #dde7ea;border-radius:14px;text-align:center;padding:8px}
.stat b{display:block;font-size:24px}
.question{font-size:clamp(23px,6vw,38px);font-weight:1000;text-align:center;margin:8px 0 2px}
.prompt{text-align:center;font-weight:800;color:#52616b;margin-bottom:8px}
.mapbox{background:#ccefff;border-radius:20px;padding:10px;overflow:hidden;border:2px solid #a9dbe8}
svg{width:100%;height:auto;display:block}
.pref{stroke:#fff;stroke-width:4;cursor:pointer;transition:.18s}
.pref:hover{filter:brightness(1.08)}
.pref.correct{fill:#43d16f!important;filter:drop-shadow(0 0 8px #1f9b48)}
.pref.wrong{fill:#f05d5d!important}
.pref.target{animation:pulse .8s infinite alternate;stroke:#ff9f00;stroke-width:7}
@keyframes pulse{from{filter:brightness(.95)}to{filter:brightness(1.35)}}
.label{font-size:22px;font-weight:1000;text-anchor:middle;paint-order:stroke;stroke:#fff;stroke-width:5;stroke-linejoin:round;pointer-events:none}
.small-label{font-size:17px}
.feedback{min-height:42px;text-align:center;font-weight:1000;font-size:21px;padding-top:8px}
.answers{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:10px}
.answer{border:3px solid #dfe6eb;background:#fff;border-radius:15px;padding:13px 8px;font-weight:1000;font-size:19px}
.answer.ok{background:#b8f2c5;border-color:#2e9c4b}
.answer.ng{background:#ffd0d0;border-color:#e44848}
.tip{display:flex;gap:10px;align-items:center;background:#fff8d8;border:2px solid #ffe08a;border-radius:15px;padding:10px 12px;font-weight:800}
.progress{height:12px;background:#e6edf1;border-radius:999px;overflow:hidden;margin-top:10px}
.progress>div{height:100%;width:0;background:linear-gradient(90deg,#ffd43b,#ff922b)}
.hidden{display:none!important}
.result{text-align:center}
.result .stars{font-size:55px}
.result .buttons{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.big{border:0;border-radius:16px;padding:15px 8px;font-weight:1000;font-size:18px}
.retry{background:#ffd43b}.review{background:#8ce99a}.back{background:#dee2e6}
footer{text-align:center;color:#6f7c83;font-size:13px;margin-top:12px}
@media(max-width:620px){
 header{grid-template-columns:58px 1fr auto}
 .teacher{width:58px;height:58px}
 .mode-tabs{grid-template-columns:1fr}
 .status{grid-template-columns:repeat(3,1fr)}
 .stat b{font-size:20px}
 .panel{padding:10px}
}
</style>
</head>

<script>
const names=['兵庫','京都','滋賀','大阪','奈良','三重','和歌山'];
let order=[],idx=0,score=0,streak=0,mistakes=0,current='',lastMode='place',locked=false;

const el=id=>document.getElementById(id);
const hideAll=()=>['home','game','result'].forEach(id=>el(id).classList.add('hidden'));
const shuffle=a=>[...a].sort(()=>Math.random()-.5);

function setTabs(active){
 ['tabLearn','tabPlace','tabName'].forEach(id=>el(id)?.classList.remove('active'));
 if(active) el(active)?.classList.add('active');
}
function showHome(){hideAll();el('home').classList.remove('hidden');clearMap();}
function showLearn(){
 hideAll();el('game').classList.remove('hidden');setTabs('tabLearn');
 el('question').textContent='近畿地方の7府県';
 el('prompt').textContent='名前と場所をよく見て覚えよう！';
 el('labels').classList.remove('hidden');el('answers').classList.add('hidden');
 el('feedback').textContent='地図を見たら、上のクイズボタンを押してね。';
 el('score').textContent='—';el('streak').textContent='—';el('count').textContent='学習中';el('bar').style.width='100%';
 clearMap();
}
function startGame(mode){
 lastMode=mode;order=shuffle(names);idx=0;score=0;streak=0;mistakes=0;locked=false;
 hideAll();el('game').classList.remove('hidden');
 setTabs(mode==='place'?'tabPlace':'tabName');
 nextQuestion();
}
function clearMap(){
 document.querySelectorAll('.pref').forEach(p=>p.classList.remove('correct','wrong','target'));
}
function nextQuestion(){
 if(idx>=order.length)return finish();
 current=order[idx];locked=false;clearMap();
 el('score').textContent=score;el('streak').textContent=streak;el('count').textContent=(idx+1)+' / 7';
 el('bar').style.width=(idx/7*100)+'%';el('feedback').textContent='';
 if(lastMode==='place'){
   el('question').textContent=current+(current==='京都'||current==='大阪'?'府':'県')+'はどこかな？';
   el('prompt').textContent='地図の都道府県をタップしてね！';
   el('labels').classList.add('hidden');el('answers').classList.add('hidden');
 }else{
   el('question').textContent='光っている場所はどこ？';
   el('prompt').textContent='下の4つから選んでね！';
   el('labels').classList.add('hidden');
   document.querySelector('.pref[data-name="'+current+'"]').classList.add('target');
   const wrong=shuffle(names.filter(n=>n!==current)).slice(0,3);
   const choices=shuffle([current,...wrong]);
   el('answers').innerHTML='';
   choices.forEach(n=>{
     const b=document.createElement('button');b.className='answer';b.textContent=n+(n==='京都'||n==='大阪'?'府':'県');
     b.onclick=()=>answerName(b,n);el('answers').appendChild(b);
   });
   el('answers').classList.remove('hidden');
 }
}
document.querySelectorAll('.pref').forEach(p=>p.addEventListener('click',()=>{
 if(lastMode!=='place'||locked)return;
 const n=p.dataset.name;
 if(n===current){
   locked=true;p.classList.add('correct');score+=10;streak++;
   el('feedback').textContent='せいかい！ すごい！ 🎉';
   setTimeout(()=>{idx++;nextQuestion()},850);
 }else{
   p.classList.add('wrong');mistakes++;streak=0;score=Math.max(0,score-1);
   el('score').textContent=score;el('streak').textContent=streak;
   el('feedback').textContent='おしい！ もう一度さがそう。';
   setTimeout(()=>p.classList.remove('wrong'),600);
 }
}));
function answerName(btn,n){
 if(locked)return;
 if(n===current){
   locked=true;btn.classList.add('ok');score+=10;streak++;
   document.querySelector('.pref[data-name="'+current+'"]').classList.add('correct');
   el('feedback').textContent='せいかい！ ばっちり！ 🎉';
   setTimeout(()=>{idx++;nextQuestion()},850);
 }else{
   btn.classList.add('ng');mistakes++;streak=0;score=Math.max(0,score-1);
   el('score').textContent=score;el('streak').textContent=streak;
   el('feedback').textContent='おしい！ ほかの答えを選ぼう。';
   setTimeout(()=>btn.classList.remove('ng'),600);
 }
}
function finish(){
 el('bar').style.width='100%';hideAll();el('result').classList.remove('hidden');
 const stars=score>=65?3:score>=50?2:1;
 el('stars').textContent='⭐'.repeat(stars);
 el('resultTitle').textContent=stars===3?'近畿マスター！':stars===2?'あと少しでマスター！':'よくがんばった！';
 el('resultText').textContent='スコアは '+score+' 点。まちがえた回数は '+mistakes+' 回でした。';
 const best=Math.max(score,Number(localStorage.getItem('kinkiBest')||0));localStorage.setItem('kinkiBest',best);
}
showHome();
</script>
</body>
</html>

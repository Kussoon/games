<!doctype html>
<html lang="ja"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Lesson 6｜さかな当てゲーム</title>
<style>
*{box-sizing:border-box}
:root{--text:#173042;--muted:#5d7482;--accent:#1480aa;--accent2:#0e6589;--line:#c8e2ec;--soft:#edf8fc;--yellow:#fff9dd}
body{margin:0;background:linear-gradient(180deg,#dff5ff,#fafdff);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;color:var(--text)}
main{max-width:760px;margin:auto;padding:12px 12px 30px}
.panel{background:#fff;border:1px solid var(--line);border-radius:20px;padding:18px;box-shadow:0 8px 24px rgba(23,48,66,.08)}
.hidden{display:none!important}
h1,h2{margin-top:0}
button,a.button{display:block;width:100%;text-align:center;text-decoration:none;padding:14px 16px;border-radius:14px;font-size:17px;font-weight:800;background:var(--accent);color:#fff;border:0;margin:10px 0;cursor:pointer}
button.secondary,a.button.secondary{background:var(--soft);color:var(--accent2);border:1px solid var(--line)}
.teacher-banner{display:flex;gap:14px;align-items:center;margin-bottom:14px}
.teacher-banner img{width:100px;height:100px;object-fit:cover;border-radius:18px}
.speech{flex:1;background:#f4fbfe;border:1px solid var(--line);border-radius:16px;padding:14px;line-height:1.65}
.lesson-chip{margin:10px auto 14px;text-align:center;padding:9px 14px;border-radius:999px;background:var(--yellow);border:1px solid #ecd77d;font-weight:800;color:#6b5512}
.kanji{font-size:88px;text-align:center;font-weight:850;margin:12px 0}
.reading{text-align:center;font-size:28px;font-weight:800;margin-bottom:10px}
.meaning,.alias-note,.career-note{font-size:17px;line-height:1.72;margin:9px 0;padding:12px 14px;border-radius:12px}
.meaning{background:#f8fcfe;border:1px solid var(--line)}
.alias-note{background:var(--yellow);border:1px solid #ecd77d}
.career-note{background:#eef8ff;border:1px solid #b8def0}
.scorebar{display:flex;justify-content:space-between;gap:10px;font-weight:800;margin-bottom:10px}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.choices button{margin:0;font-size:22px;padding:15px 8px}
.list-grid{display:grid;grid-template-columns:1fr;gap:10px}
.list-card{display:flex;gap:14px;text-decoration:none;color:inherit;background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px}
.list-card .k{font-size:34px;font-weight:850;min-width:52px}
.list-card .r{line-height:1.7}
.small{font-size:14px;color:var(--muted);line-height:1.6}
.note{background:var(--yellow);border:1px solid #ecd77d;border-radius:12px;padding:13px 14px;font-size:15px;line-height:1.65}
.nav-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
footer{text-align:center;color:var(--muted);font-size:14px;margin-top:16px}
</style>

<script>
const DATA=[{"kanji": "鮹", "reading": "たこ", "meaning": "タコを表す漢字です。", "aliases": ["鱆"], "career": "", "wiki": "https://ja.wikipedia.org/wiki/%E3%81%9F%E3%81%93"}, {"kanji": "鯔", "reading": "ぼら／とど", "meaning": "ボラや、その成長した呼び名のトドを表す漢字です。", "aliases": ["鰡"], "career": "「オボコ → イナ → ボラ → トド」などと呼び名が変わります。地域差があります。", "wiki": "https://ja.wikipedia.org/wiki/%E3%81%BC%E3%82%89"}, {"kanji": "鯲", "reading": "どじょう", "meaning": "ドジョウを表す別の漢字です。", "aliases": ["鰌"], "career": "", "wiki": "https://ja.wikipedia.org/wiki/%E3%81%A9%E3%81%98%E3%82%87%E3%81%86"}, {"kanji": "鯡", "reading": "にしん", "meaning": "ニシンを表す別の漢字です。", "aliases": ["鰊"], "career": "", "wiki": "https://ja.wikipedia.org/wiki/%E3%81%AB%E3%81%97%E3%82%93"}, {"kanji": "鱶", "reading": "ふか", "meaning": "フカを表す漢字です。フカは大型のサメを指す呼び名です。", "aliases": [], "career": "", "wiki": "https://ja.wikipedia.org/wiki/%E3%81%B5%E3%81%8B"}, {"kanji": "鰉", "reading": "ひがい", "meaning": "ヒガイを表す漢字です。", "aliases": [], "career": "", "wiki": "https://ja.wikipedia.org/wiki/%E3%81%B2%E3%81%8C%E3%81%84"}, {"kanji": "鯿", "reading": "へんぎょ", "meaning": "ヘンギョを表す漢字です。", "aliases": [], "career": "", "wiki": "https://ja.wikipedia.org/wiki/%E3%81%B8%E3%82%93%E3%81%8E%E3%82%87"}, {"kanji": "鯊", "reading": "さめ／はぜ", "meaning": "サメやハゼを表す漢字として使われます。", "aliases": [], "career": "", "wiki": "https://ja.wikipedia.org/wiki/%E3%81%95%E3%82%81"}, {"kanji": "鯝", "reading": "このしろ", "meaning": "コノシロを表す別の漢字です。", "aliases": ["鮗", "鰶"], "career": "", "wiki": "https://ja.wikipedia.org/wiki/%E3%81%93%E3%81%AE%E3%81%97%E3%82%8D"}, {"kanji": "鯫", "reading": "ざこ", "meaning": "ザコを表す漢字です。小さな魚をまとめて指す言葉です。", "aliases": [], "career": "", "wiki": "https://ja.wikipedia.org/wiki/%E3%81%96%E3%81%93"}, {"kanji": "鯷", "reading": "ひしこ", "meaning": "ヒシコを表す漢字です。イワシ類の小魚を指します。", "aliases": [], "career": "", "wiki": "https://ja.wikipedia.org/wiki/%E3%81%B2%E3%81%97%E3%81%93"}, {"kanji": "鯸", "reading": "ふぐ", "meaning": "フグを表す別の漢字です。", "aliases": ["魨", "鮐"], "career": "", "wiki": "https://ja.wikipedia.org/wiki/%E3%81%B5%E3%81%90"}, {"kanji": "鰂", "reading": "いか", "meaning": "イカを表す別の漢字です。", "aliases": ["魷"], "career": "", "wiki": "https://ja.wikipedia.org/wiki/%E3%81%84%E3%81%8B"}, {"kanji": "鰣", "reading": "えつ", "meaning": "エツを表す漢字です。", "aliases": [], "career": "", "wiki": "https://ja.wikipedia.org/wiki/%E3%81%88%E3%81%A4"}, {"kanji": "鰩", "reading": "えい", "meaning": "エイを表す別の漢字です。", "aliases": ["鱏", "鱝"], "career": "", "wiki": "https://ja.wikipedia.org/wiki/%E3%81%88%E3%81%84"}, {"kanji": "鱌", "reading": "ぞうざめ", "meaning": "ゾウザメを表す漢字です。", "aliases": [], "career": "", "wiki": "https://ja.wikipedia.org/wiki/%E3%81%9E%E3%81%86%E3%81%96%E3%82%81"}, {"kanji": "鱥", "reading": "えそ", "meaning": "エソを表す漢字です。", "aliases": [], "career": "", "wiki": "https://ja.wikipedia.org/wiki/%E3%81%88%E3%81%9D"}, {"kanji": "鱭", "reading": "えつ", "meaning": "エツを表す別の漢字です。", "aliases": ["鰣"], "career": "", "wiki": "https://ja.wikipedia.org/wiki/%E3%81%88%E3%81%A4"}, {"kanji": "鱮", "reading": "たなご", "meaning": "タナゴを表す漢字です。", "aliases": [], "career": "", "wiki": "https://ja.wikipedia.org/wiki/%E3%81%9F%E3%81%AA%E3%81%94"}];
const KEY="sakana_lesson_2_v1";
const PUNS=["タイはめでたい！", "サバを読んでも、魚へんは正直です。", "イカした漢字を覚えましたね！", "エイっと答えて大正解！", "ハモを覚えれば、もう歯も安心？", "キスの問題でも、答えはそっと選びましょう。"];
let state=JSON.parse(localStorage.getItem(KEY)||'{"trainIndex":0,"score":0,"weak":{}}');
let quizItems=[],quizIndex=0,quizCorrect=0,quizMode="normal";
let afterPun=null;

function save(){localStorage.setItem(KEY,JSON.stringify(state));}
function show(id){document.querySelectorAll("main section").forEach(s=>s.classList.add("hidden"));document.getElementById(id).classList.remove("hidden");window.scrollTo(0,0);}
function pun(next){afterPun=next;punText.textContent=PUNS[Math.floor(Math.random()*PUNS.length)];show("pun");}
punNext.onclick=()=>{const f=afterPun;afterPun=null;f&&f();};

function updateMenu(){
  resume.classList.toggle("hidden",state.trainIndex===0);
  resume.textContent=state.trainIndex?`トレーニングは ${state.trainIndex+1}文字目から続けられます。`:"";
}
function renderTraining(){
  const i=Math.min(state.trainIndex,DATA.length-1),f=DATA[i];
  trainCount.textContent=`${i+1} / ${DATA.length}`;
  trainKanji.textContent=f.kanji;trainReading.textContent=f.reading;trainMeaning.textContent=f.meaning;
  trainAliases.classList.toggle("hidden",!f.aliases.length);
  trainAliases.textContent=f.aliases.length?`ほかに「${f.aliases.join("」「")}」という漢字もあります。`:"";
  trainCareer.classList.toggle("hidden",!f.career);
  trainCareer.innerHTML=f.career?`<b>出世魚メモ</b><br>${f.career}`:"";
  trainWiki.href=f.wiki;
  trainNext.textContent=i===DATA.length-1?"学習完了":"次へ";
  show("training");
}
function startTraining(){renderTraining();}
trainNext.onclick=()=>{
  const completed=state.trainIndex+1;
  if(state.trainIndex<DATA.length-1) state.trainIndex++;
  else state.trainIndex=0;
  save();
  const next=()=>{if(completed>=DATA.length){alert("Lesson 6の20文字を学習しました！");updateMenu();show("menu");}else renderTraining();};
  if(completed%10===0) pun(next); else next();
};

function shuffle(a){return [...a].sort(()=>Math.random()-.5);}
function beginQuiz(mode){
  quizMode=mode;
  const pool=mode==="weak"?DATA.filter(x=>state.weak[x.kanji]):DATA;
  if(!pool.length){alert("苦手な漢字はまだありません。");return;}
  quizItems=shuffle(pool).slice(0,Math.min(10,pool.length));quizIndex=0;quizCorrect=0;renderQuiz();
}
function renderQuiz(){
  const f=quizItems[quizIndex];quizCount.textContent=`${quizIndex+1} / ${quizItems.length}`;quizScore.textContent=`正解 ${quizCorrect}`;
  quizKanji.textContent=f.kanji;answerBox.classList.add("hidden");choices.innerHTML="";
  const wrong=shuffle(DATA.filter(x=>x.reading!==f.reading)).slice(0,3).map(x=>x.reading);
  shuffle([f.reading,...wrong]).forEach(r=>{const b=document.createElement("button");b.textContent=r;b.onclick=()=>answer(r);choices.appendChild(b);});
  show("quiz");
}
function answer(r){
  const f=quizItems[quizIndex],ok=r===f.reading;
  if(ok){quizCorrect++;state.score=(state.score||0)+100;delete state.weak[f.kanji];}
  else state.weak[f.kanji]=(state.weak[f.kanji]||0)+1;
  save();
  choices.innerHTML="";
  answerText.innerHTML=`<b>${ok?"正解！":"残念！ 正解は「"+f.reading+"」です。"}</b><br>${f.meaning}`;
  answerAliases.classList.toggle("hidden",!f.aliases.length);
  answerAliases.textContent=f.aliases.length?`ほかに「${f.aliases.join("」「")}」という漢字もあります。`:"";
  answerCareer.classList.toggle("hidden",!f.career);
  answerCareer.innerHTML=f.career?`<b>出世魚メモ</b><br>${f.career}`:"";
  answerWiki.href=f.wiki;answerBox.classList.remove("hidden");
}
quizNext.onclick=()=>{
  quizIndex++;
  if(quizIndex>=quizItems.length){
    const finish=()=>{alert(`ゲーム終了！ ${quizItems.length}問中 ${quizCorrect}問正解、${quizCorrect*100}ポイントです。`);updateMenu();show("menu");};
    pun(finish);
  }else renderQuiz();
};

function renderList(){
  listGrid.innerHTML=DATA.map(f=>`<a class="list-card" href="${f.wiki}" target="_blank" rel="noopener"><span class="k">${f.kanji}</span><span class="r"><b>${f.reading}</b><br><span class="small">${f.meaning}</span>${f.aliases.length?`<br><span class="small">別の漢字：${f.aliases.join("・")}</span>`:""}${f.career?`<br><span class="small"><b>出世魚：</b>${f.career}</span>`:""}<br><span class="small">くわしい解説 ↗</span></span></a>`).join("");
  show("list");
}

trainBtn.onclick=startTraining;
gameBtn.onclick=()=>beginQuiz("normal");
weakBtn.onclick=()=>beginQuiz("weak");
listBtn.onclick=renderList;
document.querySelectorAll(".homeBtn").forEach(b=>b.onclick=()=>{updateMenu();show("menu");});
updateMenu();show("menu");
</script>
</main></body></html>
